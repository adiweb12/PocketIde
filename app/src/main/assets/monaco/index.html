<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>PocketIDE Editor</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #1e1e2e; }
  #editor { width: 100%; height: 100vh; }
  .loading { display: flex; align-items: center; justify-content: center; height: 100vh; color: #a855f7; font-family: monospace; font-size: 18px; }
</style>
</head>
<body>
<div class="loading" id="loading">Loading Monaco Editor...</div>
<div id="editor" style="display:none;"></div>

<script src="monaco-editor/min/vs/loader.js"></script>
<script>
  var editor;
  var suggestions = [];

  require.config({ paths: { vs: 'monaco-editor/min/vs' } });
  require(['vs/editor/editor.main'], function() {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('editor').style.display = 'block';

    editor = monaco.editor.create(document.getElementById('editor'), {
      value: '// Welcome to PocketIDE\n// Start coding here...\n',
      language: 'kotlin',
      theme: 'vs-dark',
      fontSize: 14,
      lineNumbers: 'on',
      wordWrap: 'off',
      minimap: { enabled: false },
      scrollBeyondLastLine: false,
      automaticLayout: true,
      suggestOnTriggerCharacters: true,
      quickSuggestions: true,
      tabSize: 4,
      insertSpaces: true,
      formatOnPaste: true,
    });

    editor.onDidChangeModelContent(function() {
      var content = editor.getValue();
      if (window.KotlinBridge) KotlinBridge.onContentChanged(content);
    });

    editor.onDidChangeCursorPosition(function(e) {
      if (window.KotlinBridge) KotlinBridge.onCursorChanged(e.position.lineNumber, e.position.column);
    });

    // Ctrl+S / Cmd+S to save
    editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.KeyS, function() {
      if (window.KotlinBridge) KotlinBridge.onSaveRequested();
    });
  });

  // Called from Kotlin
  window.editorSetContent = function(content, language) {
    if (!editor) return;
    editor.setValue(content);
    monaco.editor.setModelLanguage(editor.getModel(), language);
  };

  window.editorSetTheme = function(theme) {
    monaco.editor.setTheme(theme);
  };

  window.editorSetSuggestions = function(items) {
    suggestions = items;
  };

  window.editorGetContent = function() {
    return editor ? editor.getValue() : '';
  };
</script>
</body>
</html>
